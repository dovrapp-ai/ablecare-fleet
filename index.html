<script>
function format12HourTime(t){
  if(!t || typeof t !== 'string') return '';
  const m = t.trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return t;
  let h = parseInt(m[1], 10);
  const min = m[2];
  if(Number.isNaN(h)) return t;
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12;
  if(h === 0) h = 12;
  return `${h}:${min} ${ap}`;
}

function timeToMinsSafe(t){
  if(!t || typeof t !== 'string') return null;
  const m = t.trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  const h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  if(Number.isNaN(h) || Number.isNaN(min)) return null;
  return h * 60 + min;
}

function minsTo12Hour(m){
  const safe = Math.max(0, Math.round(m));
  const h24 = Math.floor(safe / 60) % 24;
  const min = safe % 60;
  const ap = h24 >= 12 ? 'PM' : 'AM';
  const h12 = h24 % 12 || 12;
  return `${h12}:${String(min).padStart(2,'0')} ${ap}`;
}

async function runOptimizer(ds){
  const snap = await ridesRef().once('value');
  const all = snap.val() || {};
  const rides = Object.entries(all)
    .filter(([k,v]) => v.date === ds)
    .map(([k,v]) => ({ ...v, _key:k }))
    .sort((a,b) => (a.time || '').localeCompare(b.time || ''));

  if(!rides.length){
    showOptError('No rides scheduled for this day. Add rides first, then optimize.');
    return;
  }
  if(!availableDriversForOpt.length){
    showOptError('No drivers selected. Check at least one driver above.');
    return;
  }

  const allDrivers = await loadDrivers();
  const drivers = allDrivers.filter(d => availableDriversForOpt.includes(d.name));

  setOptProgress(20,'Getting driving times from Google Maps.');

  const allAddresses = [BASE_ADDRESS];
  rides.forEach(r => {
    if(r.pickup) allAddresses.push(r.pickup);
    if(r.dropoff) allAddresses.push(r.dropoff);
  });
  const uniqueAddresses = [...new Set(allAddresses)];

  setOptProgress(40,'Calculating routes.');
  let distMatrix = {};
  try{
    distMatrix = await buildDistanceMatrix(uniqueAddresses);
  }catch(e){
    console.error('Distance matrix failed:', e);
    distMatrix = buildFallbackMatrix(uniqueAddresses);
  }

  setOptProgress(70,'Balancing rides across drivers.');

  try{
    const result = await optimizeWithAI(rides, drivers, distMatrix, uniqueAddresses);
    setOptProgress(100,'Done!');
    setTimeout(()=>{
      document.getElementById('opt-loading').style.display='none';
      document.getElementById('opt-results').style.display='block';
      renderOptimizerResults(result, drivers);
    }, 400);
  }catch(e){
    showOptError('Optimization failed: ' + e.message);
  }
}

async function optimizeWithAI(rides, drivers, distMatrix, addresses){
  const BASE = BASE_ADDRESS;
  const driverNames = drivers.map(d => d.name);

  const schedules = {};
  driverNames.forEach(name => {
    schedules[name] = { rides: [], totalMiles: 0, estimatedFinish: '', gaps: [] };
  });

  const warnings = [];
  const unassignedRides = [];

  const sortedRides = [...rides].sort((a,b) => (a.time || '').localeCompare(b.time || ''));

  const driverState = {};
  driverNames.forEach(name => {
    driverState[name] = {
      currentTime: timeToMinsSafe('04:30') || 270,
      currentLocation: BASE,
      blocked: false,
      blockedUntil: 0,
      totalMiles: 0
    };
  });

  function getDriveTime(from, to){
    if(!from || !to || from === to) return 0;
    const row = distMatrix[from];
    if(row && row[to] && typeof row[to].durationMins === 'number') return row[to].durationMins;
    return 20;
  }

  function getDriveMiles(from, to){
    if(!from || !to || from === to) return 0;
    const row = distMatrix[from];
    if(row && row[to] && typeof row[to].distMiles === 'number') return row[to].distMiles;
    return 8;
  }

  sortedRides.forEach(ride => {
    const pickup = ride.pickup || BASE;
    const dropoff = ride.dropoff || BASE;
    const rideTimeMins = timeToMinsSafe(ride.time);

    if(rideTimeMins === null){
      unassignedRides.push({
        ...ride,
        reason: 'Ride has no valid scheduled time'
      });
      warnings.push({
        type: 'conflict',
        driver: 'Unassigned',
        message: `Ride for ${ride.facility || 'Unknown'} at ${ride.time || 'unknown time'} could not be assigned — invalid or missing time`
      });
      return;
    }

    let bestDriver = null;
    let bestScore = Infinity;

    driverNames.forEach(name => {
      const state = driverState[name];

      if(state.blocked && rideTimeMins < state.blockedUntil) return;

      const driveToPickup = getDriveTime(state.currentLocation, pickup);
      const driveMilesToPickup = getDriveMiles(state.currentLocation, pickup);

      const earliestArrival = state.currentTime + driveToPickup;
      const lateness = Math.max(0, earliestArrival - rideTimeMins);

      if(lateness > 30) return;

      const tripMiles = getDriveMiles(pickup, dropoff);
      const tripDuration = getDriveTime(pickup, dropoff);

      let serviceTime = (ride.ridetype === 'str') ? 30 : 20;
      let returnWait = 0;
      let estimatedReturn = '';

      if(ride.wait === 'yes' || ride.waitRequired){
        returnWait = 120;
      } else if((ride.triptype || '').toLowerCase() === 'rt'){
        returnWait = 90;
      }

      const totalMilesThisRide = driveMilesToPickup + tripMiles;
      const score = totalMilesThisRide + (lateness * 0.5);

      if(score < bestScore){
        bestScore = score;
        bestDriver = {
          name,
          pickup,
          dropoff,
          driveToPickup,
          driveMilesToPickup,
          tripMiles,
          tripDuration,
          serviceTime,
          returnWait
        };
      }
    });

    if(!bestDriver){
      unassignedRides.push({
        ...ride,
        reason: 'No driver could fit this ride in time'
      });
      warnings.push({
        type: 'conflict',
        driver: 'Unassigned',
        message: `Ride for ${ride.facility || 'Unknown'} at ${format12HourTime(ride.time) || ride.time || 'unknown time'} could not be optimally assigned — check manually`
      });
      return;
    }

    const state = driverState[bestDriver.name];
    const pickup = bestDriver.pickup;
    const dropoff = bestDriver.dropoff;

    const leaveTime = Math.max(state.currentTime, rideTimeMins - bestDriver.driveToPickup);
    const departPickup = Math.max(rideTimeMins, leaveTime + bestDriver.driveToPickup);

    let finishTime = departPickup + bestDriver.tripDuration + bestDriver.serviceTime;
    let estimatedReturn = '';

    if(bestDriver.returnWait > 0){
      estimatedReturn = minsTo12Hour(finishTime + bestDriver.returnWait);
    }

    const totalMilesThisRide = bestDriver.driveMilesToPickup + bestDriver.tripMiles;

    schedules[bestDriver.name].rides.push({
      rideKey: ride._key,
      sortTimeMins: rideTimeMins,
      displayTime: format12HourTime(ride.time) || ride.time || '?',
      departBase: minsTo12Hour(leaveTime),
      pickupTime: format12HourTime(ride.time) || minsTo12Hour(departPickup),
      facility: ride.facility || '',
      client: ride.client || '',
      pickup,
      dropoff,
      ridetype: ride.ridetype || 'wc',
      triptype: ride.triptype || 'rt',
      waitRequired: ride.wait === 'yes' || !!ride.waitRequired,
      estimatedReturn,
      estimatedMiles: parseFloat(totalMilesThisRide.toFixed(1)),
      notes: ride.notes || ''
    });

    state.currentTime = finishTime;
    state.currentLocation = dropoff;
    state.totalMiles += totalMilesThisRide;

    if(ride.wait === 'yes' || ride.waitRequired){
      state.blocked = true;
      state.blockedUntil = finishTime + 120;
      warnings.push({
        type: 'wait',
        driver: bestDriver.name,
        message: `${bestDriver.name} must wait at appointment for ${ride.facility || 'this ride'} — blocked until ~${minsTo12Hour(state.blockedUntil)} estimated`
      });
    } else {
      state.blocked = false;
      state.blockedUntil = 0;
    }
  });

  driverNames.forEach(name => {
    schedules[name].rides.sort((a,b) => a.sortTimeMins - b.sortTimeMins);
    const state = driverState[name];
    const returnMiles = getDriveMiles(state.currentLocation, BASE);
    const returnTime = state.currentTime + getDriveTime(state.currentLocation, BASE);
    schedules[name].estimatedFinish = minsTo12Hour(returnTime);
    schedules[name].totalMiles = state.totalMiles + returnMiles;
  });

  const assignedRideCount = driverNames.reduce((sum,n) => sum + schedules[n].rides.length, 0);
  const totalRideCount = rides.length;
  const unassignedRideCount = unassignedRides.length;
  const assignedDrivers = driverNames.filter(n => schedules[n].rides.length > 0);
  const totalMiles = driverNames.reduce((sum,n) => sum + (schedules[n].totalMiles || 0), 0);

  const result = {
    summary: `${totalRideCount} total ride${totalRideCount!==1?'s':''}. ${assignedRideCount} assigned across ${assignedDrivers.length} driver${assignedDrivers.length!==1?'s':''}. ${unassignedRideCount} unassigned. Estimated total fleet mileage: ${totalMiles.toFixed(1)} miles. All drivers start and return to base at 3404 Old Court Rd, Pikesville.`,
    schedules,
    warnings,
    unassignedRides,
    totalMilesAllDrivers: totalMiles,
    totalRideCount,
    assignedRideCount,
    unassignedRideCount
  };

  optimizedSchedule = result;
  return result;
}

function renderOptimizerResults(result, drivers){
  document.getElementById('opt-summary').innerHTML =
    `🤖 <strong>AI Recommendation:</strong> ${result.summary || ''}` +
    (result.totalMilesAllDrivers ? `<br><br>📍 Total fleet miles: <strong>${result.totalMilesAllDrivers.toFixed(1)} miles</strong>` : '');

  const schedulesEl = document.getElementById('opt-schedules');
  schedulesEl.innerHTML = '';
  const DRIVER_COLORS_OPT = ['#00b4d8','#0096b7','#48cae4','#34d399','#f472b6'];

  drivers.forEach((driver, di) => {
    const sched = result.schedules?.[driver.name];
    if(!sched) return;

    const color = DRIVER_COLORS_OPT[di % DRIVER_COLORS_OPT.length];
    const block = document.createElement('div');
    block.className = 'opt-driver-block';

    let html = `<div class="opt-driver-header" style="background:${color}">
      <div class="opt-driver-name">👤 ${driver.name}</div>
      <div class="opt-driver-stats">${sched.rides?.length||0} rides · ${sched.totalMiles?.toFixed(1)||'?'} mi · Done ~${sched.estimatedFinish||'?'}</div>
    </div>`;

    (sched.rides || []).forEach((ride, ri) => {
      const driversCopy = drivers.map(d => d.name).filter(n => n !== driver.name);
      const moveOptions = driversCopy.map(n => `<option value="${n}">Move to ${n}</option>`).join('');
      html += `<div class="opt-ride-row">
        <div class="opt-ride-num">${ri+1}</div>
        <div class="opt-ride-info">
          <div class="opt-ride-time">${format12HourTime(ride.displayTime || ride.pickupTime || ride.departBase || '?')}</div>
          <div class="opt-ride-name">${ride.facility || ''} ${ride.client ? '— ' + ride.client : ''}</div>
          ${ride.pickup ? `<div class="opt-ride-detail">📍 ${ride.pickup}</div>` : ''}
          ${ride.dropoff ? `<div class="opt-ride-detail">🏥 ${ride.dropoff}</div>` : ''}
          <div class="opt-tags">
            <span class="opt-tag">${ride.ridetype==='str' ? '🛏 Str' : '♿ WC'}</span>
            <span class="opt-tag">${ride.triptype==='rt' ? 'RT' : '1 Way'}</span>
            ${ride.waitRequired ? '<span class="opt-tag wait">⏳ Wait Required</span>' : ''}
            ${ride.estimatedReturn ? `<span class="opt-tag gap">Return ~${ride.estimatedReturn}</span>` : ''}
            ${ride.estimatedMiles ? `<span class="opt-tag" style="background:#f0fdf4;color:#16a34a">🗺 ${ride.estimatedMiles} mi</span>` : ''}
          </div>
          ${ride.notes ? `<div class="opt-ride-detail" style="color:#f59e0b;margin-top:4px">📝 ${ride.notes}</div>` : ''}
        </div>
        <select class="opt-move-select" onchange="moveRideToDriver('${ride.rideKey}','${driver.name}',this.value,this)">
          <option value="">Move ride...</option>
          ${moveOptions}
        </select>
      </div>`;
    });

    html += `<div class="opt-ride-row" style="background:#f0fdf4">
      <div class="opt-ride-num" style="background:#16a34a">✓</div>
      <div class="opt-ride-info">
        <div class="opt-ride-time" style="color:#16a34a">${sched.estimatedFinish || '?'}</div>
        <div class="opt-ride-name" style="color:#16a34a">All rides complete · ${sched.totalMiles?.toFixed(1) || '?'} mi total</div>
      </div>
    </div>`;

    block.innerHTML = html;
    schedulesEl.appendChild(block);
  });

  if(result.unassignedRides?.length){
    const unBlock = document.createElement('div');
    unBlock.style.cssText = 'background:#fff7ed;border:1.5px solid #fed7aa;border-radius:14px;padding:16px;margin-bottom:14px';

    let unHtml = `<div style="font-weight:800;color:#c2410c;margin-bottom:10px">⚠️ ${result.unassignedRides.length} Unassigned Ride${result.unassignedRides.length!==1?'s':''}</div>`;

    result.unassignedRides.forEach((ride, idx) => {
      unHtml += `<div style="background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid #fed7aa">
        <div style="font-size:12px;font-weight:800;color:#c2410c;margin-bottom:4px">${idx+1}. ${format12HourTime(ride.time) || ride.time || 'Unknown time'} — ${ride.facility || 'Unknown facility'} ${ride.client ? '— ' + ride.client : ''}</div>
        ${ride.pickup ? `<div style="font-size:12px;color:#6b7280">📍 ${ride.pickup}</div>` : ''}
        ${ride.dropoff ? `<div style="font-size:12px;color:#6b7280">🏥 ${ride.dropoff}</div>` : ''}
        ${ride.reason ? `<div style="font-size:12px;color:#b45309;margin-top:4px">Reason: ${ride.reason}</div>` : ''}
      </div>`;
    });

    unBlock.innerHTML = unHtml;
    schedulesEl.appendChild(unBlock);
  }

  const warnEl = document.getElementById('opt-warnings');
  if(warnEl){
    warnEl.innerHTML = '';
    (result.warnings || []).forEach(w => {
      const row = document.createElement('div');
      row.className = 'opt-warning';
      row.innerHTML = `<b>⚠️ ${w.driver || 'Notice'}</b>${w.message || ''}`;
      warnEl.appendChild(row);
    });
  }
}
</script>
