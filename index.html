<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AbleCare Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#f5f7fb}

/* PIN SCREEN */
#screen-pin{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.pin-dots{display:flex;gap:10px;margin-bottom:20px}
.dot{
  width:14px;height:14px;border-radius:50%;
  border:2px solid #ccc;
}
.dot.filled{background:#00b4d8;border-color:#00b4d8}

.keypad{display:grid;grid-template-columns:repeat(3,70px);gap:10px}
.key{padding:15px;font-size:18px;border:none;border-radius:10px;background:#eee;cursor:pointer}

/* DASHBOARD */
#screen-dash{display:none;padding:15px}

.top-buttons{display:flex;gap:10px;margin-bottom:15px}
.top-buttons button{
  padding:10px;border:none;border-radius:10px;font-weight:bold;cursor:pointer
}

.layout{
  display:flex;
  gap:15px;
}

.form-box,.email-box{
  flex:1;
  background:white;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  min-height:300px;
}

textarea{width:100%;height:200px}

@media(max-width:800px){
  .layout{flex-direction:column}
}
</style>
</head>

<body>

<!-- PIN SCREEN -->
<div id="screen-pin">
  <h2>Enter PIN</h2>

  <div class="pin-dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <div id="pin-error" style="color:red;margin-bottom:10px;"></div>

  <div class="keypad">
    <button class="key" onclick="pinKey('1')">1</button>
    <button class="key" onclick="pinKey('2')">2</button>
    <button class="key" onclick="pinKey('3')">3</button>
    <button class="key" onclick="pinKey('4')">4</button>
    <button class="key" onclick="pinKey('5')">5</button>
    <button class="key" onclick="pinKey('6')">6</button>
    <button class="key" onclick="pinKey('7')">7</button>
    <button class="key" onclick="pinKey('8')">8</button>
    <button class="key" onclick="pinKey('9')">9</button>
    <button class="key" onclick="pinKey('del')">⌫</button>
    <button class="key" onclick="pinKey('0')">0</button>
    <button class="key" onclick="pinKey('ok')">OK</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dash">

  <div class="top-buttons">
    <button>+ Add Ride</button>
    <button>Paste Email</button>
    <button>Send Schedule</button>
    <button>Log All</button>
  </div>

  <h3>Paste Email Review</h3>

  <div class="layout">

    <!-- LEFT FORM -->
    <div class="form-box">
      <h4>Ride Form</h4>
      <input placeholder="Name" style="width:100%;margin-bottom:8px"><br>
      <input placeholder="Pickup" style="width:100%;margin-bottom:8px"><br>
      <input placeholder="Dropoff" style="width:100%;margin-bottom:8px"><br>
      <select style="width:100%;margin-bottom:8px">
        <option>Wheelchair</option>
        <option>Stretcher</option>
      </select>
      <select style="width:100%;">
        <option>Round Trip</option>
        <option>One Way</option>
      </select>
    </div>

    <!-- RIGHT EMAIL -->
    <div class="email-box">
      <h4>Original Email</h4>
      <textarea placeholder="Pasted email will appear here"></textarea>
    </div>

  </div>

</div>

<script>

/* PIN SYSTEM (THIS WAS YOUR ISSUE) */
let pin = '';
const correctPin = '6622';

function pinKey(k){

  if(k === 'del'){
    pin = pin.slice(0,-1);
  }
  else if(k === 'ok'){
    checkPin();
    return;
  }
  else if(pin.length < 4){
    pin += k;
  }

  updateDots();

  if(pin.length === 4){
    setTimeout(checkPin,150);
  }
}

function updateDots(){
  for(let i=0;i<4;i++){
    let d = document.getElementById('d'+i);
    if(i < pin.length){
      d.classList.add('filled');
    } else {
      d.classList.remove('filled');
    }
  }
}

function checkPin(){
  if(pin === correctPin){
    document.getElementById('screen-pin').style.display='none';
    document.getElementById('screen-dash').style.display='block';
  } else {
    document.getElementById('pin-error').innerText='Wrong PIN';
  }
  pin='';
  updateDots();
}

</script>

</body>
</html>
